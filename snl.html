<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE & LADDERS · RETRO ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root { --neon-green: #00ff41; --neon-red: #ff3333; --neon-cyan: #00ffff; --neon-yellow: #ffff00; --dark: #0a0a0f; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark); font-family: 'Press Start 2P', monospace;
    min-height: 100vh; color: #fff; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,65,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,65,0.04) 1px, transparent 1px);
    background-size: 30px 30px; animation: gs 18s linear infinite;
  }
  @keyframes gs { to { background-position: 30px 30px; } }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none; z-index: 999;
  }
  .back-btn {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--neon-cyan);
    text-decoration: none; padding: 10px 15px; border: 1px solid var(--neon-cyan);
    background: rgba(0,0,0,0.5); transition: all 0.2s;
  }
  .back-btn:hover { background: var(--neon-cyan); color: #000; }
  .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; position: relative; z-index: 10; }
  h1 { text-align: center; font-size: clamp(18px,3.5vw,32px); color: var(--neon-green);
    text-shadow: 0 0 20px var(--neon-green); margin-bottom: 25px;
    animation: flicker 5s infinite;
  }
  @keyframes flicker { 0%,94%,100%{opacity:1} 95%,97%{opacity:0.3} 96%,98%{opacity:0.9} }

  .game-layout { display: grid; grid-template-columns: 1fr 260px; gap: 25px; align-items: start; }
  @media(max-width:750px) { .game-layout { grid-template-columns: 1fr; } }

  /* Board */
  .board-wrapper { position: relative; }
  canvas#board { width: 100%; max-width: 540px; display: block; image-rendering: pixelated; }

  /* Controls */
  .controls {
    background: rgba(0,255,65,0.05); border: 2px solid rgba(0,255,65,0.3);
    padding: 20px; display: flex; flex-direction: column; gap: 16px;
  }
  .player-card {
    padding: 15px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px;
  }
  .player-card.active { border-color: var(--neon-yellow); box-shadow: 0 0 10px rgba(255,255,0,0.2); }
  .player-name { font-size: 9px; color: var(--neon-cyan); margin-bottom: 8px; }
  .player-pos { font-family: 'VT323', monospace; font-size: 28px; }
  .p1-pos { color: #ff6ec7; }
  .p2-pos { color: #6ec7ff; }

  .die-display {
    font-family: 'VT323', monospace;
    font-size: 80px;
    text-align: center;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border: 1px solid rgba(255,255,0,0.3);
    min-height: 100px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }

  .roll-btn {
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    padding: 15px; background: transparent;
    border: 2px solid var(--neon-green); color: var(--neon-green);
    cursor: pointer; width: 100%; transition: all 0.2s;
    text-shadow: 0 0 10px var(--neon-green);
  }
  .roll-btn:hover { background: var(--neon-green); color: #000; }
  .roll-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .event-msg {
    font-family: 'VT323', monospace; font-size: 22px;
    text-align: center; padding: 10px;
    min-height: 50px; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .event-msg.snake { color: var(--neon-red); animation: shake 0.4s; }
  .event-msg.ladder { color: var(--neon-green); animation: bounce 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .new-btn {
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    padding: 12px; background: transparent;
    border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.5);
    cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .new-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

  .turn-indicator {
    font-family: 'VT323', monospace; font-size: 20px;
    text-align: center; color: var(--neon-yellow);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .win-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    font-family: 'Press Start 2P', monospace;
  }
  .win-overlay.show { display: flex; }
  .win-text { font-size: 28px; color: var(--neon-yellow); text-shadow: 0 0 30px var(--neon-yellow); text-align: center; }
  .win-sub { font-family: 'VT323', monospace; font-size: 28px; color: var(--neon-green); }
</style>
</head>
<body>
<div class="scanlines"></div>
<a href="/" class="back-btn">◀ BACK</a>
<div class="container">
  <h1>🎲 SNAKE & LADDERS</h1>
  <div class="game-layout">
    <div class="board-wrapper">
      <canvas id="board" width="540" height="540"></canvas>
    </div>
    <div class="controls">
      <div class="player-card" id="p1card">
        <div class="player-name">PLAYER 1 (PINK)</div>
        <div class="player-pos p1-pos">POS: <span id="p1pos">0</span></div>
      </div>
      <div class="player-card" id="p2card">
        <div class="player-name">PLAYER 2 (BLUE)</div>
        <div class="player-pos p2-pos">POS: <span id="p2pos">0</span></div>
      </div>
      <div class="die-display" id="dieDisplay">🎲</div>
      <div class="event-msg" id="eventMsg">ROLL TO START!</div>
      <div class="turn-indicator" id="turnInd">▶ PLAYER 1'S TURN</div>
      <button class="roll-btn" id="rollBtn" onclick="rollDice()">▶ ROLL DICE</button>
      <button class="new-btn" onclick="initGame()">NEW GAME</button>
    </div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-text" id="winText">🎉</div>
  <div class="win-sub">REACHED SQUARE 100!</div>
  <button class="roll-btn" style="max-width:250px" onclick="initGame();document.getElementById('winOverlay').classList.remove('show')">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const SIZE = 10;
const CELL = canvas.width / SIZE;

const SNAKES = {16:6, 47:26, 49:11, 56:53, 62:19, 64:60, 87:24, 93:73, 95:75, 99:78};
const LADDERS = {4:14, 9:31, 20:38, 28:84, 40:59, 51:67, 63:81, 71:91};

const DIE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

let positions = [0, 0];
let currentPlayer = 0;
let rolling = false;

function getXY(pos) {
  if (pos <= 0) return { x: -1, y: -1 };
  const i = pos - 1;
  const row = Math.floor(i / SIZE);
  const col = i % SIZE;
  const x = (row % 2 === 0) ? col : (SIZE - 1 - col);
  const y = SIZE - 1 - row;
  return { x: x * CELL + CELL/2, y: y * CELL + CELL/2 };
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let row = 0; row < SIZE; row++) {
    for (let col = 0; col < SIZE; col++) {
      const sqNum = row * SIZE + col + 1;
      const px = col * CELL, py = row * CELL;
      // Checkerboard
      const isLight = (row + col) % 2 === 0;
      ctx.fillStyle = isLight ? 'rgba(0,255,65,0.08)' : 'rgba(0,0,0,0.4)';
      ctx.fillRect(px, py, CELL, CELL);
      ctx.strokeStyle = 'rgba(0,255,65,0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px, py, CELL, CELL);
      // Number
      ctx.font = `bold ${CELL*0.22}px "Press Start 2P"`;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.textAlign = 'center';
      ctx.fillText(sqNum, px + CELL/2, py + CELL*0.32);
    }
  }

  // Draw snakes
  Object.entries(SNAKES).forEach(([from, to]) => {
    const a = getXY(parseInt(from)), b = getXY(parseInt(to));
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    const mx = (a.x + b.x)/2 + 20, my = (a.y + b.y)/2;
    ctx.quadraticCurveTo(mx, my, b.x, b.y);
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.stroke();
    ctx.fillStyle = '#ff3333';
    ctx.font = `${CELL*0.35}px Arial`;
    ctx.fillText('🐍', a.x-10, a.y+8);
  });

  // Draw ladders
  Object.entries(LADDERS).forEach(([from, to]) => {
    const a = getXY(parseInt(from)), b = getXY(parseInt(to));
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 4;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#00ff41';
    ctx.font = `${CELL*0.35}px Arial`;
    ctx.fillText('🪜', b.x-10, b.y+8);
  });

  // Draw players
  const colors = ['#ff6ec7', '#6ec7ff'];
  positions.forEach((pos, i) => {
    if (pos <= 0) return;
    const {x, y} = getXY(pos);
    const offset = i === 0 ? -10 : 10;
    ctx.beginPath();
    ctx.arc(x + offset, y, CELL*0.22, 0, Math.PI*2);
    ctx.fillStyle = colors[i];
    ctx.shadowBlur = 15;
    ctx.shadowColor = colors[i];
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = `bold ${CELL*0.18}px "Press Start 2P"`;
    ctx.fillText(i+1, x + offset, y + 5);
  });
}

function rollDice() {
  if (rolling) return;
  rolling = true;
  document.getElementById('rollBtn').disabled = true;

  let count = 0;
  const interval = setInterval(() => {
    const rand = Math.floor(Math.random()*6);
    document.getElementById('dieDisplay').textContent = DIE_FACES[rand];
    count++;
    if (count >= 12) {
      clearInterval(interval);
      makeMove(rand + 1);
    }
  }, 60);
}

function makeMove(die) {
  fetch('/api/snl/roll', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({position: positions[currentPlayer]})
  }).then(r => r.json()).then(data => {
    document.getElementById('dieDisplay').textContent = DIE_FACES[data.die - 1];
    positions[currentPlayer] = data.position;

    const eventEl = document.getElementById('eventMsg');
    eventEl.className = 'event-msg';
    if (data.event === 'snake') {
      eventEl.textContent = `🐍 SNAKE! ${data.intermediate} → ${data.position}`;
      eventEl.className = 'event-msg snake';
    } else if (data.event === 'ladder') {
      eventEl.textContent = `🪜 LADDER! ${data.intermediate} → ${data.position}`;
      eventEl.className = 'event-msg ladder';
    } else {
      eventEl.textContent = `ROLLED ${data.die} → SQUARE ${data.position}`;
    }

    document.getElementById(`p${currentPlayer+1}pos`).textContent = data.position;
    drawBoard();

    if (data.won) {
      document.getElementById('winText').textContent = `🎉 PLAYER ${currentPlayer+1} WINS!`;
      document.getElementById('winOverlay').classList.add('show');
    } else {
      currentPlayer = 1 - currentPlayer;
      document.getElementById('turnInd').textContent = `▶ PLAYER ${currentPlayer+1}'S TURN`;
      const cards = ['p1card','p2card'];
      cards.forEach((c,i) => document.getElementById(c).className = `player-card ${i===currentPlayer?'active':''}`);
    }

    rolling = false;
    document.getElementById('rollBtn').disabled = false;
  });
}

function initGame() {
  positions = [0, 0];
  currentPlayer = 0;
  document.getElementById('p1pos').textContent = '0';
  document.getElementById('p2pos').textContent = '0';
  document.getElementById('dieDisplay').textContent = '🎲';
  document.getElementById('eventMsg').textContent = 'ROLL TO START!';
  document.getElementById('eventMsg').className = 'event-msg';
  document.getElementById('turnInd').textContent = '▶ PLAYER 1\'S TURN';
  document.getElementById('p1card').className = 'player-card active';
  document.getElementById('p2card').className = 'player-card';
  rolling = false;
  document.getElementById('rollBtn').disabled = false;
  drawBoard();
}

initGame();
</script>
</body>
</html>
